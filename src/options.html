<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grailed Plus Settings</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="gp-ui-body">
    <main class="gp-options">
      <h1>Grailed Plus Settings</h1>
      <p class="gp-options__copy">
        Configure listing insights, currency conversion, and dark mode for Grailed pages.
      </p>

      
      <form id="currency-form" class="gp-options__form">
        <section class="gp-options__section">
          <h2 class="gp-options__section-title">Currency</h2>
          
            <label class="gp-options__toggle">
              <input id="conversion-enabled" type="checkbox" />
              <span>Enable currency conversion</span>
            </label>



            <label for="currency-select" class="gp-options__label">Currency</label>
            <select id="currency-select" class="gp-options__control"></select>



            <label for="currency-custom" class="gp-options__label">Custom 3-letter code</label>
            <input
              id="currency-custom"
              class="gp-options__control"
              type="text"
              maxlength="3"
              placeholder="e.g. SEK"
              autocomplete="off"
              spellcheck="false"
              disabled
            />

        </section>

        <section class="gp-options__section">
          <h2 class="gp-options__section-title">Listing Insights</h2>

            <label class="gp-options__toggle">
              <input id="listing-insights-enabled" type="checkbox" />
              <span>Enable listing insights panel on listing pages</span>
            </label>

        </section>

        <section class="gp-options__section">
          <h2 class="gp-options__section-title">Dark Mode</h2>

            <label class="gp-options__toggle">
              <input id="dark-mode-enabled" type="checkbox" />
              <span>Enable site-wide dark mode</span>
            </label>



            <label for="dark-mode-behavior" class="gp-options__label">Behavior</label>
            <select id="dark-mode-behavior" class="gp-options__control">
              <option value="system">Match device theme</option>
              <option value="permanent">Permanent dark mode</option>
            </select>



            <label for="dark-mode-primary" class="gp-options__label">Primary color</label>
            <div class="gp-options__color-row">
              <input id="dark-mode-primary" class="gp-options__color" type="color" value="#000000" />
              <input
                id="dark-mode-primary-hex"
                class="gp-options__control gp-options__control--hex"
                type="text"
                maxlength="7"
                placeholder="#000000"
                autocomplete="off"
                spellcheck="false"
              />
            </div>

        </section>

        <div class="gp-options__actions">
          <button type="submit" class="gp-button gp-button--primary">Save</button>
          <button type="button" id="reset-button" class="gp-button">Reset Defaults</button>
        </div>
      </form>

      <p class="gp-options__hint">Changes apply after refreshing open Grailed tabs.</p>
      <p id="status" class="gp-options__status" aria-live="polite"></p>
    </main>

    <script src="domain/settings.js"></script>
    <script src="domain/currency.js"></script>
    <script src="options.js"></script>
  </body>
</html>
